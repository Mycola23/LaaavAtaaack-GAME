<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LAAAAVVVVAAA Attack</title>
        <link rel="stylesheet" href="./src/style.css" />
    </head>
    <body>
        <div id="ui">
            <div id="status">Waiting for players...</div>
            <button id="start-btn" style="display: none">START GAME</button>
        </div>

        <div id="controls">
            <div class="ctrl-title">Керування</div>
            <div class="ctrl-row">
                <span class="key">W - стрибок</span>
                <span class="key">A - Вліво</span>
                <span class="key">D - Вправо</span>
               
            </div>
            <div class="ctrl-row">
                <span class="key">← - Вліво</span>
                <span class="key">↑ - стрибок</span>
                <span class="key">→ - Вправо</span>
                <span class="key">Space - стрибок</span>
                
            </div>
            <div class="ctrl-row">
                <span class="key">E - Поштовх</span>
              
            </div>
            <div class="ctrl-row">
                <span class="key">Shift - Стрибок</span>
               
            </div>
        </div>

        <div id="game-container"></div>
        <div id="messages"></div>

        <script type="module" src="./src/main.ts"></script>
    </body>
</html>
